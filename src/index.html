<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Generador de Cartas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card" id="card">
      <div class="top-suit" id="top-suit"></div>
      <div class="value" id="value"></div>
      <div class="bottom-suit" id="bottom-suit"></div>
    </div>

    <button id="newCardBtn">Nueva Carta</button>

    <div class="controls">
      <label>Ancho (px):</label>
      <input type="number" id="cardWidth" placeholder="Ej: 150" />
      <label>Alto (px):</label>
      <input type="number" id="cardHeight" placeholder="Ej: 220" />
      <button id="resizeBtn">Cambiar Tamaño</button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
